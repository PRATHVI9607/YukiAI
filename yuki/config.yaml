# Yuki AI Configuration

# LLM Settings - Using verified free OpenRouter models
llm:
  provider: openrouter
  primary_model: google/gemma-3-27b-it:free
  fallback_model: qwen/qwen3-coder:free
  second_fallback_model: nvidia/nemotron-3-nano-30b-a3b:free
  max_tokens: 300
  temperature: 0.85
  stream: true

# Speech Recognition (Whisper)
whisper:
  model: base.en
  device: cpu
  language: en

# Wakeword Detection
wakeword:
  method: whisper  # Options: "porcupine" or "whisper"
  keyword: Yuki
  # For Porcupine (if method is "porcupine"):
  # access_key: ""  # Get from https://console.picovoice.ai/
  # sensitivity: 0.5
  # For Whisper (if method is "whisper"):
  chunk_duration: 2.0  # seconds
  check_interval: 0.5  # seconds

# Text-to-Speech (LuxTTS)
tts:
  engine: luxtts
  device: cuda  # Options: "cuda", "cpu", "mps" (Mac)
  reference_audio: data/yuki_voice.wav
  num_steps: 4  # Quality/speed tradeoff (3-6 recommended)
  t_shift: 0.9  # Sampling parameter (0.7-0.95)
  speed: 1.0  # Speech speed multiplier
  rms: 0.01  # Volume normalization
  ref_duration: 5  # seconds of reference audio to use
  return_smooth: false  # Smoother but less clear audio
  fallback_mode: text_only  # If LuxTTS fails, continue without voice

# User Interface (Minimal Status Window)
ui:
  width: 450
  height: 500
  position: bottom_right  # Options: "bottom_right", "bottom_left", "top_right", "top_left", "center"
  start_hidden: false
  always_on_top: true  # Toggle in system tray menu
  conversation_timeout_seconds: 30
  max_chat_history_visible: 10  # number of exchanges shown

# Memory
memory:
  max_turns: 20  # rolling conversation history
  conversation_file: memory/conversation.json
  profile_file: memory/user_profile.json

# Audio
audio:
  sample_rate: 16000
  channels: 1
  vad_aggressiveness: 2  # 0-3, higher = more aggressive
  silence_duration: 1.5  # seconds of silence before stopping recording
  
  # Audio cues (sound effects for state changes)
  enable_audio_cues: true
  wakeword_chime: true  # Play sound when wakeword detected
  thinking_beep: false  # Beep when processing (can be annoying)
  error_sound: true  # Play sound on errors

# Actions
actions:
  allowlist_file: data/command_allowlist.txt
  home_dir_only: true  # Restrict file operations to user home directory
  shell_timeout: 30  # seconds

# Undo System
undo:
  max_depth: 20  # maximum actions that can be undone

# Logging
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: Yuki.log
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
